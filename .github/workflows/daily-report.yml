name: SRN Daily Facilities Report

on:
  schedule:
    # Runs every day at 8:00 AM Central Time (13:00 UTC)
    - cron: '0 13 * * *'
  workflow_dispatch: # Allows manual trigger from GitHub UI for testing

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch@3 nodemailer@6

      - name: Run daily report script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          REPORT_RECIPIENT: Jeff.Mattaline@carshield.com
        run: node scripts/srn-daily-report.js
